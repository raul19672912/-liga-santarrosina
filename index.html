// ─── PERSISTENCIA ─────────────────────────────────────────────────────────────
function cargarLS(key, def) {
  try {
    const v = localStorage.getItem(key);
    if (!v) return def;
    const p = JSON.parse(v);
    if (Array.isArray(def)) return Array.isArray(p) && p.length > 0 ? p : def;
    return (typeof p === "object" && p !== null && Object.keys(p).length > 0) ? p : def;
  } catch { return def; }
}
function guardarLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ─── COMPRIMIR IMAGEN ─────────────────────────────────────────────────────────
function comprimirImagen(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const MAX = 180;
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else       { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL("image/jpeg", 0.75));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function calcTabla(eqs, parts) {
  const t = eqs.map(e => ({...e,PJ:0,PG:0,PE:0,PP:0,GF:0,GC:0,DG:0,Pts:0}));
  parts.filter(p => p.jugado).forEach(p => {
    const l = t.find(e => e.id === p.eqL), v = t.find(e => e.id === p.eqV);
    if (!l || !v) return;
    l.PJ++; v.PJ++; l.GF += p.gL; l.GC += p.gV; v.GF += p.gV; v.GC += p.gL;
    if (p.gL > p.gV)      { l.PG++; l.Pts += 3; v.PP++; }
    else if (p.gL < p.gV) { v.PG++; v.Pts += 3; l.PP++; }
    else                   { l.PE++; v.PE++; l.Pts++; v.Pts++; }
  });
  t.forEach(e => e.DG = e.GF - e.GC);
  return t.sort((a,b) => b.Pts-a.Pts || b.DG-a.DG || b.GF-a.GF);
}

function calcStats(jugs, parts) {
  return jugs.map(j => {
    let g=0, am=0, ro=0;
    parts.filter(p => p.jugado).forEach(p => {
      p.goles.forEach(x     => { if (x.jid === j.id) g  += x.n; });
      p.amarillas.forEach(x => { if (x.jid === j.id) am += x.n; });
      p.rojas.forEach(x     => { if (x.jid === j.id) ro += x.n; });
    });
    return {...j, goles:g, amarillas:am, rojas:ro};
  }).sort((a,b) => b.goles - a.goles);
}

</div></body></html>`;

function Modal({children, onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"flex-end",zIndex:400}} onClick={onClose}>
      <div style={{background:"#0e1220",borderRadius:"18px 18px 0 0",padding:20,width:"100%",maxHeight:"92vh",overflowY:"auto",boxSizing:"border-box"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#64748b",fontSize:28,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        {children}
      </div>

}

function Escudo({logoUrl, escudo, size=40}) {
  const s = size;
  if (logoUrl) return <img src={logoUrl} alt="" style={{width:s,height:s,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(255,255,255,0.15)",flexShrink:0}}/>;
  return <span style={{fontSize:s*0.55,lineHeight:1,flexShrink:0}}>{escudo||"⚽"}</span>;
}

function SubirEscudo({escudo, logoUrl, onEmoji, onFoto, label}) {
  const [open, setOpen] = useState(false);
  const [proc, setProc] = useState(false);

  function onFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    setProc(true);
    comprimirImagen(f, url => {
      onFoto(url);
      setProc(false);
      setOpen(false);
    });
    // reset input
    e.target.value = "";
  }

  return (
    <>
      <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:7}}>{label||"Escudo"}</div>
      <button
        onClick={() => setOpen(true)}
        style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,marginBottom:10,width:"100%"}}
      >
        <Escudo logoUrl={logoUrl} escudo={escudo} size={38}/>
        <span style={{fontSize:13,color:C.muted,fontFamily:"sans-serif"}}>Tocar para cambiar escudo</span>
      </button>

      {open && (
        <Modal onClose={() => setOpen(false)}>
          <div style={{fontSize:17,letterSpacing:2,color:C.acc,marginBottom:16,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>CAMBIAR ESCUDO</div>

          {/* Subir foto */}
          <div style={{...card,borderColor:`${C.acc}40`,marginBottom:14}}>
            <div style={{fontSize:13,color:C.acc,letterSpacing:1,marginBottom:8,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>SUBIR FOTO REAL</div>
            <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:10}}>
              Seleccioná la foto del escudo desde tu celular
            </div>
            <label style={{display:"block",padding:"14px",background:`${C.acc}12`,border:`2px dashed ${C.acc}`,borderRadius:9,textAlign:"center",cursor:"pointer",fontFamily:"sans-serif",fontSize:14,color:C.acc,letterSpacing:0.5}}>
              {proc ? "⏳ Procesando..." : "📁 Elegir foto del celular"}

            </label>
            {logoUrl && (
              <div style={{textAlign:"center",marginTop:10}}>
                <div style={{marginBottom:8,display:"flex",justifyContent:"center"}}>
                  <Escudo logoUrl={logoUrl} escudo={escudo} size={60}/>
                </div>
                <button onClick={() => { onFoto(""); setOpen(false); }} style={btnSm(C.danger)}>
                  Quitar foto actual

            )}

          {/* Elegir emoji */}

          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
            {ESCUDOS_EMOJI.map(e => (
              <button key={e} onClick={() => { onEmoji(e); setOpen(false); }}
                style={{fontSize:24,background:(!logoUrl&&escudo===e)?"rgba(0,229,176,0.2)":"transparent",border:`2px solid ${(!logoUrl&&escudo===e)?C.acc:"transparent"}`,borderRadius:10,cursor:"pointer",padding:5}}>
                {e}
              </button>
            ))}
          </div>
        </Modal>
      )}
    </>
  );
}

// ─── FIXTURE ──────────────────────────────────────────────────────────────────
function Fixture({eqs, parts, setParts, jugs, liga}) {
  const [ed, setEd] = useState(null);
  const [form, setForm] = useState({});
  const [gT, setGT] = useState([]);
  const [aT, setAT] = useState([]);
  const [arbF, setArbF] = useState({});
  const fechas = [...new Set(parts.map(p => p.fecha))];

  function abrir(p) {
    setEd(p.id);
    setForm({gL:p.gL??"", gV:p.gV??""});
    setGT(p.goles.map(x=>({...x})));
    setAT(p.amarillas.map(x=>({...x})));
    setArbF(p.arb||{p:"",a1:"",a2:""});
  }

  function guardar() {
    const gL=parseInt(form.gL), gV=parseInt(form.gV);
    if(isNaN(gL)||isNaN(gV)) return;
    setParts(prev=>prev.map(p=>p.id!==ed?p:{...p,jugado:true,gL,gV,
      goles:gT.filter(x=>x.n>0),
      amarillas:aT.filter(x=>x.n>0),
      arb:arbF}));
    setEd(null);
  }

  function gn(arr,jid){return arr.find(x=>x.jid===jid)?.n||0;}
  function sn(set,jid,n){set(prev=>{const e=prev.find(x=>x.jid===jid);if(e)return prev.map(x=>x.jid===jid?{...x,n}:x);return[...prev,{jid,n}];});}

  const pe = parts.find(p=>p.id===ed);
  const eqL = pe ? eqs.find(e=>e.id===pe.eqL) : null;
  const eqV = pe ? eqs.find(e=>e.id===pe.eqV) : null;
  const jp = pe ? jugs.filter(j=>new Set([pe.eqL,pe.eqV]).has(j.equipoId)) : [];

  if (parts.length===0) return (
    <div>
      <div style={{fontSize:17,letterSpacing:3,color:C.acc,marginBottom:12,borderLeft:`3px solid ${C.acc}`,paddingLeft:10,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>FIXTURE</div>
      <div style={{...card,textAlign:"center",color:C.muted,fontFamily:"sans-serif",padding:28}}>Sin partidos. Agregá desde FECHAS.</div>
    </div>
  );

  return (
    <div>
      <div style={{fontSize:17,letterSpacing:3,color:C.acc,marginBottom:12,borderLeft:`3px solid ${C.acc}`,paddingLeft:10,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>FIXTURE</div>
      {fechas.map(f=>(
        <div key={f}>
          <div style={{fontSize:10,letterSpacing:2,color:C.muted,marginBottom:6,fontFamily:"sans-serif"}}>{f.toUpperCase()}</div>
          {parts.filter(p=>p.fecha===f).map(p=>{
            const l=eqs.find(e=>e.id===p.eqL), v=eqs.find(e=>e.id===p.eqV);
            if(!l&&!v&&!p.eqL&&!p.eqV) return null;
            return (
              <div key={p.id} style={{...card,borderLeft:`3px solid ${p.jugado?C.acc:C.border}`}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{display:"flex",justifyContent:"center",marginBottom:4}}><Escudo logoUrl={l?.logoUrl} escudo={l?.escudo} size={38}/></div>
                    <div style={{fontSize:11,fontFamily:"sans-serif",lineHeight:1.2}}>{l?.nombre||"Por definir"}</div>
                  </div>
                  <div style={{fontSize:20,padding:"0 8px",minWidth:56,textAlign:"center",fontFamily:"'Bebas Neue',Impact,sans-serif"}}>
                    {p.jugado
                      ? <><span style={{color:C.acc}}>{p.gL}</span>{" - "}<span style={{color:C.acc}}>{p.gV}</span></>
                      : <span style={{fontSize:11,color:C.muted}}>VS</span>}
                  </div>
                  <div style={{flex:1,textAlign:"center"}}>
                    <div style={{display:"flex",justifyContent:"center",marginBottom:4}}><Escudo logoUrl={v?.logoUrl} escudo={v?.escudo} size={38}/></div>
                    <div style={{fontSize:11,fontFamily:"sans-serif",lineHeight:1.2}}>{v?.nombre||"Por definir"}</div>
                  </div>
                </div>
                <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:10,flexWrap:"wrap"}}>
                  <button style={btnSm()} onClick={()=>abrir(p)}>{p.jugado?"✏️ Editar":"⚽ Cargar resultado"}</button>
                  {p.jugado && <button style={btnSm(C.warn)} onClick={()=>abrirPDF({partido:p,eqs,jugs,liga})}>📄 PDF</button>}
                </div>
              </div>
            );
          })}
        </div>
      ))}

      {ed && pe && (
        <Modal onClose={()=>setEd(null)}>
          <div style={{fontSize:18,letterSpacing:2,marginBottom:14,color:C.acc,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>CARGAR RESULTADO</div>
          <div style={row}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:C.muted,fontFamily:"sans-serif",marginBottom:4}}>{eqL?.nombre}</div>
              <input type="number" min="0" style={inp} placeholder="0" value={form.gL} onChange={e=>setForm(f=>({...f,gL:e.target.value}))}/>
            </div>
            <div style={{fontSize:18,paddingTop:14,color:C.muted}}>-</div>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:C.muted,fontFamily:"sans-serif",marginBottom:4}}>{eqV?.nombre}</div>
              <input type="number" min="0" style={inp} placeholder="0" value={form.gV} onChange={e=>setForm(f=>({...f,gV:e.target.value}))}/>
            </div>
          </div>
          <div style={{fontSize:12,color:C.warn,fontFamily:"sans-serif",marginBottom:7}}>🏟️ Árbitros</div>
          <input style={inp} placeholder="Árbitro principal" value={arbF.p||""} onChange={e=>setArbF(f=>({...f,p:e.target.value}))}/>
          <input style={inp} placeholder="Asistente 1" value={arbF.a1||""} onChange={e=>setArbF(f=>({...f,a1:e.target.value}))}/>
          <input style={inp} placeholder="Asistente 2" value={arbF.a2||""} onChange={e=>setArbF(f=>({...f,a2:e.target.value}))}/>
          <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:7}}>⚽ Goleadores</div>
          {jp.map(j=>(
            <div key={j.id} style={{...row,marginBottom:7,fontFamily:"sans-serif",fontSize:13}}>
              <span style={{flex:1}}>{j.nombre}</span>
              <input type="number" min="0" style={{...inp,width:52,marginBottom:0,textAlign:"center"}} value={gn(gT,j.id)} onChange={e=>sn(setGT,j.id,parseInt(e.target.value)||0)}/>
            </div>
          ))}
          <div style={{fontSize:12,color:C.warn,fontFamily:"sans-serif",margin:"10px 0 7px"}}>🟨 Amarillas</div>
          {jp.map(j=>(
            <div key={j.id} style={{...row,marginBottom:7,fontFamily:"sans-serif",fontSize:13}}>
              <span style={{flex:1}}>{j.nombre}</span>
              <input type="number" min="0" style={{...inp,width:52,marginBottom:0,textAlign:"center"}} value={gn(aT,j.id)} onChange={e=>sn(setAT,j.id,parseInt(e.target.value)||0)}/>
            </div>
          ))}
          <button style={btnPrimary()} onClick={guardar}>GUARDAR</button>
        </Modal>
      )}
    </div>
  );
}

// ─── ESTADÍSTICAS ─────────────────────────────────────────────────────────────

  const am  = st.filter(j=>j.amarillas>0).sort((a,b)=>b.amarillas-a.amarillas);
  const ge = id => eqs.find(e=>e.id===id);
  const stl = {fontSize:17,letterSpacing:3,color:C.acc,marginBottom:12,borderLeft:`3px solid ${C.acc}`,paddingLeft:10,fontFamily:"'Bebas Neue',Impact,sans-serif"};
  return (
    <div>
      <div style={stl}>ESTADÍSTICAS</div>
      <div style={{fontSize:12,letterSpacing:2,color:C.muted,marginBottom:8,fontFamily:"sans-serif"}}>GOLEADORES</div>
      <div style={card}>
        {gol.length===0 && <div style={{color:C.muted,fontFamily:"sans-serif",fontSize:13}}>Sin goles registrados</div>}

            <div style={{flex:1,fontFamily:"sans-serif"}}>
              <div style={{fontSize:13}}>{j.nombre}</div>
              <div style={{fontSize:11,color:C.muted,display:"flex",alignItems:"center",gap:4}}><Escudo logoUrl={eq?.logoUrl} escudo={eq?.escudo} size={14}/>{eq?.nombre}</div>
            </div>
            <div style={{fontSize:20,color:C.acc,fontWeight:700}}>{j.goles} ⚽</div>
          </div>
        );})}
      </div>
      <div style={{fontSize:12,letterSpacing:2,color:C.muted,marginBottom:8,marginTop:12,fontFamily:"sans-serif"}}>TARJETAS AMARILLAS</div>
      <div style={card}>
        {am.length===0 && <div style={{color:C.muted,fontFamily:"sans-serif",fontSize:13}}>Sin tarjetas</div>}
        {am.map((j,i)=>{const eq=ge(j.equipoId);return(
          <div key={j.id} style={{...row,padding:"7px 0",borderTop:i>0?`1px solid ${C.border}`:"none"}}>
            <div style={{flex:1,fontFamily:"sans-serif"}}>

            </div>
            <div style={{fontSize:18,color:C.warn,fontWeight:700}}>{j.amarillas} 🟨</div>
          </div>
        );})}
      </div>

// ─── FECHAS ───────────────────────────────────────────────────────────────────
function Fechas({parts, setParts, eqs}) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({fecha:"",l:"",v:""});
  const fechas = [...new Set(parts.map(p=>p.fecha))];
  const stl = {fontSize:17,letterSpacing:3,color:C.acc,marginBottom:12,borderLeft:`3px solid ${C.acc}`,paddingLeft:10,fontFamily:"'Bebas Neue',Impact,sans-serif"};

  function agregar() {
    if(!form.fecha||!form.l||!form.v) return;
    setParts(prev=>[...prev,{id:Date.now(),fecha:form.fecha,eqL:parseInt(form.l),eqV:parseInt(form.v),gL:null,gV:null,jugado:false,arb:{p:"",a1:"",a2:""},goles:[],amarillas:[],rojas:[]}]);
    setModal(false); setForm({fecha:"",l:"",v:""});
  }

  return (
    <div>
      <div style={stl}>FECHAS</div>
      {fechas.length===0 && <div style={{...card,textAlign:"center",color:C.muted,fontFamily:"sans-serif",padding:24}}>Sin fechas. Agregá el primer partido!</div>}
      {fechas.map(f=>{
        const ps=parts.filter(p=>p.fecha===f), jg=ps.filter(p=>p.jugado).length;
        return(
          <div key={f} style={card}>
            <div style={{...row,marginBottom:8}}>
              <div style={{flex:1,fontSize:15,fontFamily:"'Bebas Neue',Impact,sans-serif",letterSpacing:1}}>{f}</div>
              <div style={{background:`${C.acc}20`,color:C.acc,borderRadius:5,padding:"2px 8px",fontSize:11,fontFamily:"sans-serif",fontWeight:700}}>{jg}/{ps.length}</div>
            </div>
            {ps.map(p=>{
              const l=eqs.find(e=>e.id===p.eqL), v=eqs.find(e=>e.id===p.eqV);
              return(
                <div key={p.id} style={{...row,padding:"5px 0",borderTop:`1px solid ${C.border}`,fontFamily:"sans-serif",fontSize:12}}>
                  <span style={{flex:1,color:C.muted}}>{l?.nombre||"Por definir"} vs {v?.nombre||"Por definir"}</span>
                  {p.jugado && <span style={{color:C.acc,fontSize:11}}>✓</span>}
                  <button style={btnSm(C.danger)} onClick={()=>setParts(prev=>prev.filter(x=>x.id!==p.id))}>✕</button>
                </div>
              );
            })}
          </div>
        );
      })}
      <button style={btnPrimary()} onClick={()=>setModal(true)}>+ AGREGAR PARTIDO</button>
      {modal && (
        <Modal onClose={()=>setModal(false)}>
          <div style={{fontSize:18,letterSpacing:2,marginBottom:14,color:C.acc,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>NUEVO PARTIDO</div>
          <input style={inp} placeholder="Nombre de la fecha (ej: Fecha 3)" value={form.fecha} onChange={e=>setForm(f=>({...f,fecha:e.target.value}))}/>
          <select style={sel} value={form.l} onChange={e=>setForm(f=>({...f,l:e.target.value}))}>
            <option value="">Equipo local</option>
            {eqs.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
          <select style={sel} value={form.v} onChange={e=>setForm(f=>({...f,v:e.target.value}))}>
            <option value="">Equipo visitante</option>
            {eqs.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
          <button style={btnPrimary()} onClick={agregar}>AGREGAR</button>
        </Modal>
      )}
    </div>
  );
}

// ─── EQUIPOS ──────────────────────────────────────────────────────────────────
function Equipos({eqs, setEqs, jugs, setJugs}) {
  const [modal, setModal] = useState(null);
  const [sel, setSel] = useState(null);
  const [form, setForm] = useState({});
  const pos = ["Arquero","Defensor","Mediocampista","Extremo","Delantero"];
  const roles = ["Director Tecnico","Preparador Fisico","Ayudante de Campo","Preparador de Arqueros","Medico","Utilero"];
  const stl = {fontSize:17,letterSpacing:3,color:C.acc,marginBottom:12,borderLeft:`3px solid ${C.acc}`,paddingLeft:10,fontFamily:"'Bebas Neue',Impact,sans-serif"};

  function guEq() {
    if(!form.nombre) return;
    const datos = {nombre:form.nombre, color:form.color||C.acc, escudo:form.escudo||"⚽", logoUrl:form.logoUrl||""};
    if(form.id) setEqs(prev=>prev.map(e=>e.id===form.id?{...e,...datos}:e));
    else setEqs(prev=>[...prev,{id:Date.now(),...datos,cuerpoTecnico:[]}]);
    setModal(null); setForm({});
  }

  function guJ() {
    if(!form.nombre||!form.eqId) return;
    const datos = {nombre:form.nombre, numero:parseInt(form.numero)||0, posicion:form.posicion||"", equipoId:parseInt(form.eqId), estado:form.estado||"habilitado"};
    if(form.id) setJugs(prev=>prev.map(j=>j.id===form.id?{...j,...datos}:j));
    else setJugs(prev=>[...prev,{id:Date.now(),...datos,historial:[{club:eqs.find(e=>e.id===parseInt(form.eqId))?.nombre||"",desde:new Date().toISOString().slice(0,10),hasta:null}]}]);
    setModal(null); setForm({});
  }

  function addCT(eqId) { setEqs(prev=>prev.map(e=>e.id!==eqId?e:{...e,cuerpoTecnico:[...(e.cuerpoTecnico||[]),{id:Date.now(),rol:"Director Tecnico",nombre:""}]})); }
  function updCT(eqId,mId,k,v) { setEqs(prev=>prev.map(e=>e.id!==eqId?e:{...e,cuerpoTecnico:(e.cuerpoTecnico||[]).map(m=>m.id===mId?{...m,[k]:v}:m)})); }
  function delCT(eqId,mId) { setEqs(prev=>prev.map(e=>e.id!==eqId?e:{...e,cuerpoTecnico:(e.cuerpoTecnico||[]).filter(m=>m.id!==mId)})); }

  return (
    <div>
      <div style={stl}>EQUIPOS</div>
      {eqs.map(eq=>{
        const jEq=jugs.filter(j=>j.equipoId===eq.id), exp=sel===eq.id;
        return (
          <div key={eq.id} style={{...card,borderLeft:`3px solid ${eq.color}`}}>
            <div style={{...row,cursor:"pointer",justifyContent:"space-between"}} onClick={()=>setSel(exp?null:eq.id)}>
              <div style={row}>
                <Escudo logoUrl={eq.logoUrl} escudo={eq.escudo} size={44}/>
                <div>
                  <div style={{fontSize:14,fontFamily:"sans-serif"}}>{eq.nombre}</div>
                  <div style={{fontSize:11,color:C.muted,fontFamily:"sans-serif"}}>{jEq.length} jugadores · {(eq.cuerpoTecnico||[]).length} CT</div>
                </div>
              </div>
              <div style={row}>
                <button style={btnSm()} onClick={e=>{e.stopPropagation();setForm({...eq,logoUrl:eq.logoUrl||""});setModal("eq");}}>✏️</button>
                <span style={{color:exp?C.acc:C.muted,fontSize:15,paddingLeft:4}}>{exp?"▲":"▼"}</span>
              </div>
            </div>

            {exp && (
              <div style={{marginTop:12}}>
                <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginBottom:7,fontFamily:"sans-serif"}}>PLANTEL</div>
                {jEq.length===0 && <div style={{color:C.muted,fontSize:12,fontFamily:"sans-serif"}}>Sin jugadores</div>}
                {jEq.map(j=>(
                  <div key={j.id} style={{...row,padding:"6px 0",borderTop:`1px solid ${C.border}`,fontFamily:"sans-serif"}}>
                    <span style={{background:eq.color,color:"#fff",borderRadius:4,padding:"2px 7px",fontSize:11,fontWeight:700,minWidth:28,textAlign:"center"}}>#{j.numero}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13}}>{j.nombre}</div>
                      <div style={{fontSize:10,color:EC[j.estado]||C.muted}}>{j.estado}</div>
                    </div>
                    <span style={{fontSize:11,color:C.muted}}>{j.posicion}</span>
                    <button style={btnSm()} onClick={()=>{setForm({...j,eqId:j.equipoId});setModal("jug");}}>✏️</button>
                    <button style={btnSm(C.danger)} onClick={()=>setJugs(prev=>prev.filter(x=>x.id!==j.id))}>✕</button>
                  </div>
                ))}
                <button style={{...btnPrimary(),marginTop:8,fontSize:13}} onClick={()=>{setForm({eqId:eq.id});setModal("jug");}}>+ JUGADOR</button>

                <div style={{fontSize:11,color:C.muted,letterSpacing:2,marginTop:14,marginBottom:7,fontFamily:"sans-serif"}}>CUERPO TÉCNICO</div>
                {(eq.cuerpoTecnico||[]).length===0 && <div style={{color:C.muted,fontSize:12,fontFamily:"sans-serif"}}>Sin cuerpo técnico</div>}
                {(eq.cuerpoTecnico||[]).map(m=>(
                  <div key={m.id} style={{...row,marginBottom:7}}>
                    <select style={{...sel,marginBottom:0,fontSize:11,flex:"0 0 auto",width:"auto"}} value={m.rol} onChange={e=>updCT(eq.id,m.id,"rol",e.target.value)}>
                      {roles.map(r=><option key={r} value={r}>{r}</option>)}
                    </select>
                    <input style={{...inp,marginBottom:0,flex:1,fontSize:12}} placeholder="Nombre" value={m.nombre} onChange={e=>updCT(eq.id,m.id,"nombre",e.target.value)}/>
                    <button style={btnSm(C.danger)} onClick={()=>delCT(eq.id,m.id)}>✕</button>
                  </div>
                ))}
                <button style={{...btnPrimary("#10b981"),marginTop:4,fontSize:13}} onClick={()=>addCT(eq.id)}>+ CUERPO TÉCNICO</button>
              </div>
            )}
          </div>
        );
      })}
      <button style={btnPrimary()} onClick={()=>{setForm({});setModal("eq");}}>+ NUEVO EQUIPO</button>

      {modal==="eq" && (
        <Modal onClose={()=>{setModal(null);setForm({});}}>
          <div style={{fontSize:18,letterSpacing:2,marginBottom:14,color:C.acc,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>{form.id?"EDITAR":"NUEVO"} EQUIPO</div>
          <input style={inp} placeholder="Nombre del equipo" value={form.nombre||""} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}/>
          <SubirEscudo
            escudo={form.escudo||"⚽"}
            logoUrl={form.logoUrl||""}
            onEmoji={v=>setForm(f=>({...f,escudo:v,logoUrl:""}))}
            onFoto={v=>setForm(f=>({...f,logoUrl:v}))}
            label="Escudo del club"
          />
          <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:6}}>Color del equipo</div>
          <input type="color" style={{width:"100%",height:40,background:"none",border:"none",cursor:"pointer",marginBottom:9}} value={form.color||C.acc} onChange={e=>setForm(f=>({...f,color:e.target.value}))}/>
          <button style={btnPrimary()} onClick={guEq}>GUARDAR</button>
        </Modal>
      )}

      {modal==="jug" && (
        <Modal onClose={()=>{setModal(null);setForm({});}}>
          <div style={{fontSize:18,letterSpacing:2,marginBottom:14,color:C.acc,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>{form.id?"EDITAR":"NUEVO"} JUGADOR</div>
          <input style={inp} placeholder="Nombre completo" value={form.nombre||""} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}/>
          <input type="number" style={inp} placeholder="Número de camiseta" value={form.numero||""} onChange={e=>setForm(f=>({...f,numero:e.target.value}))}/>
          <select style={sel} value={form.posicion||""} onChange={e=>setForm(f=>({...f,posicion:e.target.value}))}>
            <option value="">Posición</option>
            {pos.map(p=><option key={p} value={p}>{p}</option>)}
          </select>
          <select style={sel} value={form.eqId||""} onChange={e=>setForm(f=>({...f,eqId:parseInt(e.target.value)}))}>
            <option value="">Equipo</option>
            {eqs.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
          </select>
          <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:7}}>Estado del pase</div>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            {["habilitado","suspendido","libre"].map(est=>(
              <button key={est} onClick={()=>setForm(f=>({...f,estado:est}))}
                style={{flex:1,padding:"8px 4px",borderRadius:9,border:`2px solid ${(form.estado||"habilitado")===est?EC[est]:"rgba(255,255,255,0.1)"}`,background:(form.estado||"habilitado")===est?`${EC[est]}20`:"transparent",color:(form.estado||"habilitado")===est?EC[est]:C.muted,cursor:"pointer",fontFamily:"sans-serif",fontSize:11}}>
                {est}
              </button>
            ))}
          </div>
          <button style={btnPrimary()} onClick={guJ}>GUARDAR</button>
        </Modal>
      )}
    </div>
  );
}

// ─── LIBRO DE PASES ───────────────────────────────────────────────────────────
function LibroPases({jugs, setJugs, eqs}) {
  const [busq, setBusq] = useState("");
  const [jSel, setJSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [fp, setFp] = useState({club:"",desde:""});
  const fil = jugs.filter(j=>j.nombre.toLowerCase().includes(busq.toLowerCase()));
  const jug = jugs.find(j=>j.id===jSel);
  const eq = jug ? eqs.find(e=>e.id===jug.equipoId) : null;
  const stl = {fontSize:17,letterSpacing:3,color:C.acc,marginBottom:12,borderLeft:`3px solid ${C.acc}`,paddingLeft:10,fontFamily:"'Bebas Neue',Impact,sans-serif"};

  function agrPase() {
    if(!fp.club||!fp.desde) return;
    setJugs(prev=>prev.map(j=>{
      if(j.id!==jSel) return j;
      const h=(j.historial||[]).map(p=>p.hasta===null?{...p,hasta:fp.desde}:p);
      return {...j,historial:[...h,{club:fp.club,desde:fp.desde,hasta:null}]};
    }));
    setModal(false); setFp({club:"",desde:""});
  }

  return (
    <div>
      <div style={stl}>LIBRO DE PASES</div>
      <input style={inp} placeholder="🔍 Buscar jugador..." value={busq} onChange={e=>setBusq(e.target.value)}/>
      {!jSel ? (
        <div>
          {fil.length===0 && <div style={{...card,textAlign:"center",color:C.muted,fontFamily:"sans-serif",padding:24}}>No hay jugadores registrados todavía.</div>}
          {fil.map(j=>{const eqJ=eqs.find(e=>e.id===j.equipoId);return(
            <div key={j.id} style={{...card,cursor:"pointer",borderLeft:`3px solid ${EC[j.estado]||C.border}`}} onClick={()=>setJSel(j.id)}>
              <div style={row}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontFamily:"sans-serif"}}>{j.nombre}</div>
                  <div style={{fontSize:11,color:C.muted,fontFamily:"sans-serif",display:"flex",alignItems:"center",gap:4}}>
                    <Escudo logoUrl={eqJ?.logoUrl} escudo={eqJ?.escudo} size={14}/>{eqJ?.nombre} · #{j.numero} · {j.posicion}
                  </div>
                </div>
                <span style={{background:`${EC[j.estado]}20`,color:EC[j.estado],borderRadius:5,padding:"2px 8px",fontSize:10,fontFamily:"sans-serif",fontWeight:700}}>{j.estado}</span>
              </div>
            </div>
          );})}
        </div>
      ) : (
        <div>
          <button style={{...btnSm(),marginBottom:12,fontFamily:"sans-serif"}} onClick={()=>setJSel(null)}>‹ Volver</button>
          {jug && <>
            <div style={{...card,borderLeft:`4px solid ${eq?.color||C.acc}`}}>
              <div style={{...row,marginBottom:10}}>
                <Escudo logoUrl={eq?.logoUrl} escudo={eq?.escudo} size={48}/>
                <div>
                  <div style={{fontSize:17,fontFamily:"sans-serif"}}>{jug.nombre}</div>
                  <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif"}}>#{jug.numero} · {jug.posicion} · {eq?.nombre}</div>
                </div>
              </div>
              <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:7}}>Estado del pase</div>
              <div style={{display:"flex",gap:8}}>
                {["habilitado","suspendido","libre"].map(est=>(
                  <button key={est} onClick={()=>setJugs(prev=>prev.map(j=>j.id===jug.id?{...j,estado:est}:j))}
                    style={{flex:1,padding:"7px 4px",borderRadius:9,border:`2px solid ${jug.estado===est?EC[est]:"rgba(255,255,255,0.1)"}`,background:jug.estado===est?`${EC[est]}20`:"transparent",color:jug.estado===est?EC[est]:C.muted,cursor:"pointer",fontFamily:"sans-serif",fontSize:11}}>
                    {est}
                  </button>
                ))}
              </div>
            </div>
            <div style={{fontSize:12,letterSpacing:2,color:C.muted,marginBottom:8,marginTop:4,fontFamily:"sans-serif"}}>HISTORIAL DE PASES</div>
            {(jug.historial||[]).length===0 && <div style={{...card,color:C.muted,fontFamily:"sans-serif",fontSize:13}}>Sin historial registrado</div>}
            {[...(jug.historial||[])].reverse().map((p,i)=>(
              <div key={i} style={{...card,borderLeft:`3px solid ${p.hasta===null?C.acc:C.border}`}}>
                <div style={row}>
                  <div style={{flex:1,fontFamily:"sans-serif"}}>
                    <div style={{fontSize:14,fontWeight:600}}>{p.club}</div>
                    <div style={{fontSize:11,color:C.muted}}>Desde: {p.desde}{p.hasta?` · Hasta: ${p.hasta}`:""}</div>
                  </div>
                  {p.hasta===null && <span style={{background:`${C.acc}20`,color:C.acc,borderRadius:5,padding:"2px 8px",fontSize:10,fontFamily:"sans-serif",fontWeight:700}}>ACTUAL</span>}
                </div>
              </div>
            ))}
            <button style={btnPrimary()} onClick={()=>setModal(true)}>+ REGISTRAR PASE</button>
          </>}
        </div>
      )}
      {modal && (
        <Modal onClose={()=>setModal(false)}>
          <div style={{fontSize:18,letterSpacing:2,marginBottom:6,color:C.acc,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>NUEVO PASE</div>
          <div style={{fontSize:11,color:C.muted,fontFamily:"sans-serif",marginBottom:12}}>Se cerrará el pase actual y se abrirá uno nuevo</div>
          <input style={inp} placeholder="Club de destino" value={fp.club} onChange={e=>setFp(f=>({...f,club:e.target.value}))}/>
          <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:5}}>Fecha de transferencia</div>
          <input type="date" style={inp} value={fp.desde} onChange={e=>setFp(f=>({...f,desde:e.target.value}))}/>
          <button style={btnPrimary()} onClick={agrPase}>REGISTRAR PASE</button>
        </Modal>
      )}
    </div>
  );
}

// ─── LISTA DE CAMPEONATOS ─────────────────────────────────────────────────────
function ListaCamps({camps, setCamps, onSel}) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({nombre:"",tipo:"copa"});
  const stl = {fontSize:17,letterSpacing:3,color:C.acc,marginBottom:12,borderLeft:`3px solid ${C.acc}`,paddingLeft:10,fontFamily:"'Bebas Neue',Impact,sans-serif"};

  function crear() {
    if(!form.nombre.trim()) return;
    setCamps(prev=>[...prev,{id:Date.now(),nombre:form.nombre.trim(),tipo:form.tipo,equiposIds:[],partidos:[]}]);
    setModal(false); setForm({nombre:"",tipo:"copa"});
  }

  return (
    <div>
      <div style={stl}>CAMPEONATOS</div>
      {camps.length===0 && <div style={{...card,textAlign:"center",color:C.muted,fontFamily:"sans-serif",padding:32}}><div style={{fontSize:44,marginBottom:10}}>🏆</div>Sin campeonatos todavía.</div>}
      {camps.map(c=>{
        const cfg=TIPOS[c.tipo]||TIPOS.otro;
        const jg=c.partidos.filter(p=>p.jugado).length;
        const tot=c.partidos.length;
        const pct=tot>0?Math.round((jg/tot)*100):0;
        return (
          <div key={c.id} style={{...card,borderLeft:`4px solid ${cfg.color}`,cursor:"pointer"}} onClick={()=>onSel(c.id)}>
            <div style={{...row,justifyContent:"space-between"}}>
              <div style={row}>
                <span style={{fontSize:28}}>{cfg.icon}</span>
                <div>
                  <div style={{fontSize:15,fontFamily:"sans-serif",fontWeight:600}}>{c.nombre}</div>
                  <div style={{fontSize:11,color:cfg.color,fontFamily:"sans-serif",letterSpacing:1}}>
                    {cfg.label.toUpperCase()} · {c.equiposIds?.length||0} equipos · {jg}/{tot} partidos
                  </div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
                <button style={btnSm(C.danger)} onClick={e=>{e.stopPropagation();setCamps(prev=>prev.filter(x=>x.id!==c.id));}}>✕</button>
                <span style={{color:C.acc,fontSize:20,lineHeight:1}}>›</span>
              </div>
            </div>
            {tot>0 && (
              <div style={{marginTop:10}}>
                <div style={{height:3,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct}%`,background:cfg.color,borderRadius:2}}/>
                </div>
                <div style={{fontSize:10,color:C.muted,fontFamily:"sans-serif",marginTop:3}}>{pct}% completado</div>
              </div>
            )}
          </div>
        );
      })}
      <button style={btnPrimary()} onClick={()=>setModal(true)}>+ NUEVO CAMPEONATO</button>
      {modal && (
        <Modal onClose={()=>setModal(false)}>
          <div style={{fontSize:20,letterSpacing:2,marginBottom:16,color:C.acc,fontFamily:"'Bebas Neue',Impact,sans-serif"}}>NUEVO CAMPEONATO</div>
          <input style={inp} placeholder="Nombre (ej: Apertura 2026)" value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}/>
          <div style={{fontSize:12,color:C.muted,fontFamily:"sans-serif",marginBottom:8}}>Tipo</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
            {Object.entries(TIPOS).map(([k,cfg])=>(
              <button key={k} onClick={()=>setForm(f=>({...f,tipo:k}))}
                style={{padding:"8px 14px",borderRadius:9,cursor:"pointer",fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:14,letterSpacing:1,border:`2px solid ${form.tipo===k?cfg.color:"rgba(255,255,255,0.1)"}`,background:form.tipo===k?`${cfg.color}20`:"transparent",color:form.tipo===k?cfg.color:C.muted}}>
                {cfg.icon} {cfg.label}
              </button>
            ))}
          </div>
          <button style={btnPrimary()} onClick={crear}>CREAR</button>
        </Modal>
      )}
    </div>
  );
}

// ─── DETALLE CAMPEONATO ───────────────────────────────────────────────────────
const ITABS = [
  {id:"tabla",    label:"TABLA",   icon:"📊"},
  {id:"fixture",  label:"FIXTURE", icon:"📅"},
  {id:"stats",    label:"STATS",   icon:"⭐"},
  {id:"fechas",   label:"FECHAS",  icon:"⚙️"},
  {id:"clubes",   label:"CLUBES",  icon:"🛡️"},
];

function CampeonatoDetalle({camp, setCamps, eqs, jugs, liga, onVolver}) {
  const [tab, setTab] = useState("tabla");
  const cfg = TIPOS[camp.tipo] || TIPOS.otro;

  // Filtrar solo los equipos y jugadores del campeonato
  const eqsCamp = eqs.filter(e => (camp.equiposIds||[]).includes(e.id));
  const jugsCamp = jugs.filter(j => eqsCamp.some(e => e.id === j.equipoId));

  function setParts(fn) {
    setCamps(prev=>prev.map(c=>c.id!==camp.id?c:{
      ...c, partidos: typeof fn==="function" ? fn(c.partidos) : fn
    }));
  }

  return (
    <div>
      <div style={{background:"linear-gradient(135deg,#1a1f35,#0d1220)",borderBottom:`3px solid ${cfg.color}`,padding:"14px 16px 10px",position:"sticky",top:0,zIndex:100}}>
        <div style={{...row,marginBottom:10}}>
          <button onClick={onVolver} style={{background:"none",border:"none",color:C.muted,fontSize:26,cursor:"pointer",padding:"0 6px 0 0",lineHeight:1}}>‹</button>
          <span style={{fontSize:22}}>{cfg.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:16,letterSpacing:1,color:C.text,fontFamily:"sans-serif",fontWeight:600}}>{camp.nombre}</div>
            <div style={{fontSize:10,color:cfg.color,letterSpacing:2,fontFamily:"sans-serif"}}>{cfg.label.toUpperCase()} · {eqsCamp.length} equipos</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2}}>
          {ITABS.map(t=>(
            <button key={t.id} style={{padding:"7px 11px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:12,letterSpacing:1,whiteSpace:"nowrap",background:tab===t.id?cfg.color:"rgba(255,255,255,0.07)",color:tab===t.id?"#07090f":C.muted}} onClick={()=>setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:14}}>
        {tab==="tabla"   && <Tabla   eqs={eqsCamp} parts={camp.partidos}/>}
        {tab==="fixture" && <Fixture eqs={eqsCamp} parts={camp.partidos} setParts={setParts} jugs={jugsCamp} liga={liga}/>}
        {tab==="stats"   && <Stats   jugs={jugsCamp} parts={camp.partidos} eqs={eqsCamp}/>}
        {tab==="fechas"  && <Fechas  parts={camp.partidos} setParts={setParts} eqs={eqsCamp}/>}
        {tab==="clubes"  && <ClubesCamp eqs={eqsCamp} jugs={jugs}/>}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
const MTABS = [
  {id:"c", label:"TORNEOS", icon:"🏆"},
  {id:"e", label:"EQUIPOS", icon:"👥"},
  {id:"p", label:"PASES",   icon:"📋"},
  {id:"l", label:"MI LIGA", icon:"⚙️"},
];

export default function App() {
  const [tab,  setTab]  = useState("c");
  const [liga, setLiga] = useState(() => cargarLS("lsf_liga",  LIGA_INIT));
  const [camps,setCamps] = useState(() => cargarLS("lsf_camps", CAMP_INIT));
  const [eqs,  setEqs]  = useState(() => cargarLS("lsf_eqs",   EQ_INIT));
  const [jugs, setJugs] = useState(() => cargarLS("lsf_jugs",  JUG_INIT));
  const [campAb, setCampAb] = useState(null);
  const [saved, setSaved] = useState(false);

  // Guardar automaticamente con useEffect
  useEffect(() => { guardarLS("lsf_liga",  liga);  }, [liga]);
  useEffect(() => { guardarLS("lsf_camps", camps); setSaved(true); setTimeout(()=>setSaved(false),1200); }, [camps]);
  useEffect(() => { guardarLS("lsf_eqs",   eqs);   setSaved(true); setTimeout(()=>setSaved(false),1200); }, [eqs]);
  useEffect(() => { guardarLS("lsf_jugs",  jugs);  setSaved(true); setTimeout(()=>setSaved(false),1200); }, [jugs]);

  function setLigaY(v)  { setLiga(v);  }
  function setCampsY(v) { setCamps(v); }
  function setEqsY(v)   { setEqs(v);   }
  function setJugsY(v)  { setJugs(v);  }

  const campAct = camps.find(c => c.id === campAb);

  const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #07090f; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    ::-webkit-scrollbar { display: none; }
    select option { background: #151b2e; color: #f1f5f9; }
  `;

  const appStyle = {
    minHeight:"100vh", background:C.bg,
    fontFamily:"'Bebas Neue',Impact,sans-serif",
    color:C.text, maxWidth:480, margin:"0 auto", paddingBottom:20,
  };

  if (campAct) return (
    <div style={appStyle}>
      <style>{CSS}</style>
      <CampeonatoDetalle
        camp={campAct} setCamps={setCampsY}
        eqs={eqs} jugs={jugs} liga={liga}
        onVolver={() => setCampAb(null)}
      />
    </div>
  );

  return (
    <div style={appStyle}>
      <style>{CSS}</style>
      <div style={{background:"linear-gradient(135deg,#1a1f35,#0d1220)",borderBottom:`3px solid ${liga.color||C.acc}`,padding:"14px 16px 10px",position:"sticky",top:0,zIndex:100}}>
        <div style={{...row,marginBottom:10}}>
          <div style={{width:46,height:46,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:"2px solid rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.05)"}}>
            <Escudo logoUrl={liga.logoUrl||""} escudo={liga.escudo||"⚽"} size={46}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:17,letterSpacing:1,color:C.text,lineHeight:1,fontFamily:"sans-serif",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{liga.nombre}</div>
            <div style={{fontSize:9,color:liga.color||C.acc,letterSpacing:2,fontFamily:"sans-serif",marginTop:2}}>
              {liga.fundacion ? `FUNDADA EL ${liga.fundacion}` : "GESTIÓN DE TORNEOS"}
            </div>
          </div>
          {saved && <div style={{fontSize:10,color:C.acc,fontFamily:"sans-serif",flexShrink:0}}>💾</div>}
        </div>
        <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:2}}>
          {MTABS.map(t=>(
            <button key={t.id} style={{padding:"7px 12px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"'Bebas Neue',Impact,sans-serif",fontSize:13,letterSpacing:1,whiteSpace:"nowrap",background:tab===t.id?C.acc:"rgba(255,255,255,0.07)",color:tab===t.id?"#07090f":C.muted}} onClick={()=>setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:14}}>
        {tab==="c" && <ListaCamps camps={camps} setCamps={setCampsY} onSel={id=>setCampAb(id)}/>}
        {tab==="e" && <Equipos eqs={eqs} setEqs={setEqsY} jugs={jugs} setJugs={setJugsY}/>}
        {tab==="p" && <LibroPases jugs={jugs} setJugs={setJugsY} eqs={eqs}/>}
        {tab==="l" && <ConfigLiga liga={liga} setLiga={setLigaY}/>}
      </div>
    </div>
  );
}


    // Montar la app
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
